<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NestClaw Web Console</title>
    <link rel="stylesheet" href="/static/agent-console.css">
  </head>
  <body>
    <main class="page-shell">
      <section class="hero">
        <p class="eyebrow">NestClaw</p>
        <h1>가장 단순한 운영 화면</h1>
        <p class="hero-copy">
          지금은 개발자용 API 위주라 사용이 어렵습니다. 이 화면은 도구 목록 조회와 tool draft 생성,
          review 후 적용만 빠르게 확인하기 위한 최소 콘솔입니다.
        </p>
        <div class="hero-links">
          <a href="/docs" target="_blank" rel="noreferrer">Swagger 열기</a>
          <a href="/api/v1/tools" target="_blank" rel="noreferrer">도구 JSON 보기</a>
        </div>
      </section>

      <section class="panel actor-panel">
        <div class="panel-header">
          <h2>현재 사용자</h2>
          <span id="health-badge" class="badge pending">확인 중</span>
        </div>
        <div class="form-grid">
          <label>
            <span>Actor ID</span>
            <input id="actor-id" type="text" value="qa_user" autocomplete="off">
          </label>
          <label>
            <span>Role</span>
            <select id="actor-role">
              <option value="requester" selected>requester</option>
              <option value="reviewer">reviewer</option>
              <option value="approver">approver</option>
              <option value="admin">admin</option>
            </select>
          </label>
          <label>
            <span>Approver ID</span>
            <input id="acted-by" type="text" value="qa_approver" autocomplete="off">
          </label>
        </div>
        <p class="helper">
          목록 조회와 draft 생성은 `requester`로도 됩니다. draft 적용은 `approver` 또는 `admin`으로 바꾼 뒤 실행하세요.
        </p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>도구 카탈로그</h2>
          <button id="refresh-tools" class="button subtle" type="button">새로고침</button>
        </div>
        <div class="form-grid compact">
          <label>
            <span>Capability Family</span>
            <input id="filter-family" type="text" placeholder="예: messaging">
          </label>
          <label>
            <span>External System</span>
            <input id="filter-system" type="text" placeholder="예: slack">
          </label>
        </div>
        <div id="tool-list" class="tool-list"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>도구 Draft 만들기</h2>
          <button id="create-draft" class="button" type="button">Draft 생성</button>
        </div>
        <div class="form-grid">
          <label class="full">
            <span>요청 설명</span>
            <textarea id="draft-request-text" rows="4">Slack 알림 도구를 추가하고 싶다</textarea>
          </label>
          <label>
            <span>Tool ID (선택)</span>
            <input id="draft-tool-id" type="text" value="slack.message.ops_notify" autocomplete="off">
          </label>
          <label>
            <span>Title (선택)</span>
            <input id="draft-title" type="text" value="Ops Notify Slack Tool" autocomplete="off">
          </label>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>Draft 검토 / 적용</h2>
        </div>
        <div class="form-grid">
          <label>
            <span>Draft ID</span>
            <input id="draft-id" type="text" placeholder="tooldraft_xxxxx" autocomplete="off">
          </label>
          <div class="button-stack">
            <button id="load-draft" class="button subtle" type="button">Draft 조회</button>
            <button id="apply-draft" class="button danger" type="button">Draft 적용</button>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>응답</h2>
        </div>
        <pre id="output" class="output">로딩 중...</pre>
      </section>
    </main>

    <script type="module" src="/static/agent-console.js"></script>
  </body>
</html>
