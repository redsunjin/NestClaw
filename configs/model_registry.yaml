version: 1

providers:
  - id: local_primary
    type: local
    enabled: true
    engine: ollama
    model: llama3.1:8b
    purpose: "sensitive_internal"

  - id: local_lmstudio
    type: local
    enabled: true
    engine: lmstudio
    model: auto
    purpose: "local_openai_compatible"

  - id: api_general
    type: api
    enabled: true
    engine: openai
    model: gpt-4.1-mini
    purpose: "general_reasoning"

routing_rules:
  - when:
      task_type: classify_intent
    use_provider: local_lmstudio

  - when:
      sensitivity: high
    use_provider: local_primary

  - when:
      sensitivity: low
      task_type: summarize
    use_provider: api_general

  - when:
      external_send: true
    require_human_approval: true
